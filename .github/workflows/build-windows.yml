name: Build Windows EXE

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. 安装 Qt 5.15 (MSVC 2019 x64) ──────────────────────────────────
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      # ── 2. 配置 MSVC 工具链 ───────────────────────────────────────────────
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── 3. 下载并安装 PCL 预编译包（含 VTK、Boost、Eigen3、FLANN）─────────
      - name: Install PCL (prebuilt AllInOne)
        shell: pwsh
        run: |
          $url = "https://github.com/PointCloudLibrary/pcl/releases/download/pcl-1.14.1/PCL-1.14.1-AllInOne-msvc2022-win64.exe"
          $out = "$env:TEMP\PCL-AllInOne.exe"
          Write-Host "Downloading PCL AllInOne installer..."
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing
          Write-Host "Installing PCL silently..."
          Start-Process -FilePath $out -ArgumentList "/S" -Wait -NoNewWindow
          Write-Host "PCL installation done."

      # ── 4. 配置 CMake ─────────────────────────────────────────────────────
      - name: Configure CMake
        shell: pwsh
        run: |
          $pclRoot = "C:\Program Files\PCL 1.14.1"
          $vtkDir  = (Get-ChildItem "$pclRoot\3rdParty\VTK\lib\cmake" -Directory | Select-Object -First 1).FullName
          Write-Host "PCL root : $pclRoot"
          Write-Host "VTK dir  : $vtkDir"
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DPCL_ROOT="$pclRoot" `
            -DVTK_DIR="$vtkDir" `
            "-DCMAKE_PREFIX_PATH=${{ env.Qt5_DIR }};$pclRoot;$pclRoot\3rdParty\VTK;$pclRoot\3rdParty\Eigen;$pclRoot\3rdParty\FLANN;$pclRoot\3rdParty\Boost"

      # ── 5. 编译 ───────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── 6. windeployqt 打包 Qt 依赖 DLL ──────────────────────────────────
      - name: Deploy Qt DLLs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\package | Out-Null
          Copy-Item build\Release\PointCloudViewer.exe build\package\
          windeployqt --release --no-translations build\package\PointCloudViewer.exe

      # ── 7. 复制 PCL / VTK / Boost 运行时 DLL ────────────────────────────
      - name: Copy PCL runtime DLLs
        shell: pwsh
        run: |
          $pclRoot = "C:\Program Files\PCL 1.14.1"
          # PCL 自身 DLL
          Get-ChildItem "$pclRoot\bin\*.dll" | Copy-Item -Destination build\package\ -Force
          # VTK DLL
          $vtkBin = "$pclRoot\3rdParty\VTK\bin"
          if (Test-Path $vtkBin) {
            Get-ChildItem "$vtkBin\*.dll" | Copy-Item -Destination build\package\ -Force
          }
          # 其余第三方 DLL（Boost、FLANN 等）
          Get-ChildItem "$pclRoot\3rdParty" -Recurse -Filter "*.dll" |
            Copy-Item -Destination build\package\ -Force

      # ── 9. 上传制品 ───────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PointCloudViewer-Windows-x64
          path: build/package/
          retention-days: 30

      # ── 10. 可选：发布 Release（仅在推送 tag 时触发）─────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/package/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
