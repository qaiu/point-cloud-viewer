name: Build Windows EXE

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    env:
      PCL_VERSION: '1.13.1'
      PCL_ROOT: C:\PCL

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. 安装 Qt 5.15 (MSVC 2019 x64) ──────────────────────────────────
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      # ── 2. 配置 MSVC 工具链 ───────────────────────────────────────────────
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── 3. 下载并安装 PCL 预编译包（含 VTK、Boost、Eigen3、FLANN）─────────
      - name: Cache PCL
        id: cache-pcl
        uses: actions/cache@v4
        with:
          path: ${{ env.PCL_ROOT }}
          key: pcl-${{ env.PCL_VERSION }}-msvc2022-win64

      - name: Install PCL (prebuilt AllInOne)
        if: steps.cache-pcl.outputs.cache-hit != 'true'
        timeout-minutes: 25
        shell: pwsh
        run: |
          $pcl_ver = "${{ env.PCL_VERSION }}"
          $pclRoot = "${{ env.PCL_ROOT }}"
          $url = "https://github.com/PointCloudLibrary/pcl/releases/download/pcl-$pcl_ver/PCL-$pcl_ver-AllInOne-msvc2022-win64.exe"
          $out = "$env:TEMP\PCL-AllInOne.exe"
          Write-Host "Downloading PCL $pcl_ver AllInOne installer from:`n  $url"
          Invoke-WebRequest -Uri $url -OutFile $out -UseBasicParsing -MaximumRetryCount 3 -RetryIntervalSec 10
          # 校验是否为有效 PE 可执行文件（防止下载到 404 页面）
          $magic = [System.IO.File]::ReadAllBytes($out)[0..1]
          if ($magic[0] -ne 0x4D -or $magic[1] -ne 0x5A) {
            Write-Error "Downloaded file is not a valid EXE (got 404 or redirect). Check URL."
            exit 1
          }
          Write-Host "File size: $([math]::Round((Get-Item $out).Length/1MB,1)) MB"
          Write-Host "Installing PCL silently to $pclRoot..."
          $proc = Start-Process -FilePath $out -ArgumentList @("/S", "/D=$pclRoot") -PassThru
          if (-not $proc.WaitForExit(1200000)) {   # 20 分钟超时
            $proc.Kill()
            Write-Error "PCL installer timed out after 20 minutes."
            exit 1
          }
          if ($proc.ExitCode -ne 0) {
            Write-Error "PCL installer failed with exit code $($proc.ExitCode)."
            exit $proc.ExitCode
          }
          Write-Host "PCL installation done (exit code: $($proc.ExitCode))."

      - name: Verify PCL install
        shell: pwsh
        run: |
          $pclRoot = "${{ env.PCL_ROOT }}"
          $pclConfig = Join-Path $pclRoot "cmake\PCLConfig.cmake"
          if (-not (Test-Path $pclConfig)) {
            Write-Error "PCLConfig.cmake was not found at $pclConfig"
            Get-ChildItem $pclRoot -Recurse -Depth 3 | Select-Object FullName
            exit 1
          }
          Write-Host "PCL root : $pclRoot"
          Write-Host "PCL config: $pclConfig"

      # ── 4. 配置 CMake ─────────────────────────────────────────────────────
      - name: Configure CMake
        shell: pwsh
        run: |
          $pclRoot = "${{ env.PCL_ROOT }}"
          $vtkDir  = (Get-ChildItem "$pclRoot\3rdParty\VTK\lib\cmake" -Directory | Select-Object -First 1).FullName
          Write-Host "PCL root : $pclRoot"
          Write-Host "VTK dir  : $vtkDir"
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DPCL_ROOT="$pclRoot" `
            -DVTK_DIR="$vtkDir" `
            "-DCMAKE_PREFIX_PATH=${{ env.Qt5_DIR }};$pclRoot;$pclRoot\3rdParty\VTK;$pclRoot\3rdParty\Eigen;$pclRoot\3rdParty\FLANN;$pclRoot\3rdParty\Boost"

      # ── 5. 编译 ───────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── 6. windeployqt 打包 Qt 依赖 DLL ──────────────────────────────────
      - name: Deploy Qt DLLs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\package | Out-Null
          Copy-Item build\Release\PointCloudViewer.exe build\package\
          windeployqt --release --no-translations build\package\PointCloudViewer.exe

      # ── 7. 复制 PCL / VTK / Boost 运行时 DLL ────────────────────────────
      - name: Copy PCL runtime DLLs
        shell: pwsh
        run: |
          $pclRoot = "${{ env.PCL_ROOT }}"
          # PCL 自身 DLL
          Get-ChildItem "$pclRoot\bin\*.dll" | Copy-Item -Destination build\package\ -Force
          # VTK DLL
          $vtkBin = "$pclRoot\3rdParty\VTK\bin"
          if (Test-Path $vtkBin) {
            Get-ChildItem "$vtkBin\*.dll" | Copy-Item -Destination build\package\ -Force
          }
          # 其余第三方 DLL（Boost、FLANN 等）
          Get-ChildItem "$pclRoot\3rdParty" -Recurse -Filter "*.dll" |
            Copy-Item -Destination build\package\ -Force

      # ── 9. 上传制品 ───────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PointCloudViewer-Windows-x64
          path: build/package/
          retention-days: 30

      # ── 10. 可选：发布 Release（仅在推送 tag 时触发）─────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/package/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
