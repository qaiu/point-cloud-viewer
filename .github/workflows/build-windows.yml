cd /workspaces/point-cloud-viewer

git add .github/workflows/build-windows.yml CMakeLists.txt
git commit -m "ci: add GitHub Actions workflow to build Windows exe"
git push origin mastername: Build Windows EXE

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. 安装 Qt 5.15 (MSVC 2019 x64) ──────────────────────────────────
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      # ── 2. 配置 MSVC 工具链 ───────────────────────────────────────────────
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── 3. 恢复 vcpkg 缓存（PCL + VTK 编译耗时较长，缓存很重要）──────────
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/packages
            C:/vcpkg/buildtrees
          key: vcpkg-pcl-${{ runner.os }}-x64-windows-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            vcpkg-pcl-${{ runner.os }}-x64-windows-

      # ── 4. 安装 PCL（包含 VTK、Eigen3、Boost、FLANN 等依赖）────────────
      - name: Install PCL via vcpkg
        run: |
          cd C:\vcpkg
          git pull
          .\bootstrap-vcpkg.bat -disableMetrics
          .\vcpkg install pcl:x64-windows --recurse
          .\vcpkg integrate install

      # ── 5. 配置 CMake ─────────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake -B build ^
            -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows ^
            -DCMAKE_PREFIX_PATH="${{ env.Qt5_DIR }}"

      # ── 6. 编译 ───────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── 7. windeployqt 打包 Qt 依赖 DLL ──────────────────────────────────
      - name: Deploy Qt DLLs
        run: |
          mkdir -p build\package
          copy build\Release\PointCloudViewer.exe build\package\
          windeployqt --release --no-translations build\package\PointCloudViewer.exe

      # ── 8. 复制 vcpkg 运行时 DLL（PCL / VTK / Boost 等）─────────────────
      - name: Copy vcpkg runtime DLLs
        run: |
          $vcpkgBin = "C:\vcpkg\installed\x64-windows\bin"
          Get-ChildItem "$vcpkgBin\*.dll" | Copy-Item -Destination build\package\ -Force
        shell: pwsh

      # ── 9. 上传制品 ───────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PointCloudViewer-Windows-x64
          path: build/package/
          retention-days: 30

      # ── 10. 可选：发布 Release（仅在推送 tag 时触发）─────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/package/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
